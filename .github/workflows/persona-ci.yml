name: Persona CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:

jobs:
  persona-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry==1.8.2

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run persona-focused test suite
        run: poetry run pytest -q tests/core/services tests/core/domain tests/infra/db/neo4j tests/infra/llm/providers
