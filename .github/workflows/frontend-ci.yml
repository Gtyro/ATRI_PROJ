name: Frontend CI

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "plugins/webui/frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "plugins/webui/frontend/**"
      - ".github/workflows/frontend-ci.yml"
  schedule:
    - cron: "30 2 * * *"

jobs:
  frontend-pr-checks:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: plugins/webui/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: plugins/webui/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run unit tests
        run: npm run test

      - name: Install Playwright Chromium
        run: npm run test:e2e:install

      - name: Run smoke E2E
        run: npm run test:e2e:smoke

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-artifacts-pr
          path: |
            plugins/webui/frontend/test-results
            plugins/webui/frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 7

  frontend-nightly-e2e:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: plugins/webui/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: plugins/webui/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run unit tests
        run: npm run test

      - name: Install Playwright Chromium
        run: npm run test:e2e:install

      - name: Run full E2E
        run: npm run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-artifacts-nightly
          path: |
            plugins/webui/frontend/test-results
            plugins/webui/frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 7
